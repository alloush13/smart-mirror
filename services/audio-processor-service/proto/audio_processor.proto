syntax = "proto3";

package audio;

service AudioProcessor {

  rpc StreamAudio(stream AudioStreamChunk) returns (stream AudioStreamEvent);
}

message AudioStreamChunk {

  bytes pcm = 1;

  string session_id = 2;

  int32 sample_rate = 3;

  int32 channels = 4;

  int64 timestamp_ms = 5;
}

message AudioStreamEvent {

  oneof event {

    SpeechStarted speech_started = 1;

    SpeechFrame speech_frame = 2;

    SpeechEnded speech_ended = 3;

    UtteranceReady utterance_ready = 4;

    ErrorEvent error = 5;
  }
}

message SpeechStarted {

  int64 timestamp_ms = 1;
}

message SpeechFrame {

  bytes cleaned_pcm = 1;

  float speech_probability = 2;

  float speech_ratio = 3;

  bool contains_speech = 4;

  int64 timestamp_ms = 5;
}

message SpeechEnded {

  int64 timestamp_ms = 1;

  float final_speech_ratio = 2;

  int32 duration_ms = 3;
}

message UtteranceReady {

  string session_id = 1;

  bytes pcm = 2;

  int32 sample_rate = 3;

  int32 duration_ms = 4;

  int64 timestamp_ms = 5;
}

message ErrorEvent {

  string code = 1;

  string message = 2;
}