syntax = "proto3";

package vision.face;

service FaceRecognition {
  rpc Recognize(RecognizeRequest)
      returns (RecognizeResponse);
}

message RecognizeRequest {
  bytes image = 1;
}

message RecognizeResponse {
  repeated Prediction predictions = 1;
}

message Prediction {
  string name = 1;
  float confidence = 2;
}