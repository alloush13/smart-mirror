syntax = "proto3";

package audio;

// SERVICE DEFINITION
service AudioProcessingService {

  // Processes a full audio file in a single request
  rpc ProcessAudioFile(AudioFileRequest) returns (AudioFileResult);

  // Real-time bidirectional audio processing stream
  rpc StreamAudioProcessing(stream AudioStreamInput)
      returns (stream AudioStreamEvent);
}


enum AudioFormat {
  AUDIO_FORMAT_UNSPECIFIED = 0;
  WAV = 1;
  MP3 = 2;
  OPUS = 3;
  FLAC = 4;
}

// UNARY (FILE PROCESSING)

message AudioFileRequest {
  bytes audio_data = 1;
  AudioFormat format = 2;
  string session_id = 3;
}

message AudioFileResult {
  bytes cleaned_audio = 1;
  float speech_ratio = 2;
  bool contains_speech = 3;
  int32 sample_rate = 4;
}


// STREAMING (REAL-TIME PROCESSING)

message AudioStreamInput {
  bytes audio_chunk = 1;
  int32 chunk_index = 2;
  string session_id = 3;
  AudioFormat format = 4;
}

message AudioStreamEvent {
  oneof event {

    AudioChunkResult chunk_result = 1;

    AudioProcessingSummary final_summary = 2;
  }
}

message AudioChunkResult {
  bytes processed_audio_chunk = 1;
  int32 chunk_index = 2;
  bool contains_speech = 3;
  float confidence_score = 4;
}

message AudioProcessingSummary {
  float overall_speech_ratio = 1;
  int32 sample_rate = 2;
}