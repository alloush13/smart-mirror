services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_mirror_server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_ORIGIN: http://localhost:5173
      # GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
  client:
    build:
      context: ./client
    container_name: smart_mirror_client
    ports:
      - '5173:5173'
    restart: unless-stopped
  whisper-service:
    build:
      context: ./whisper-service
    container_name: whisper-service
    ports:
      - '8000:8000'
    restart: unless-stopped
  skin-analysis-service:
    build:
      context: ./skin-analysis-service
    container_name: skin-analysis-service
    ports:
      - '8001:8000'
    restart: unless-stopped