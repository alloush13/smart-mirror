services:
  server:
    build: ./server
    container_name: smart_mirror_server
    restart: unless-stopped
    networks:
      - backend
    environment:
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:5173
      SKIN_ANALYSIS_SERVICE_URL: skin-analysis-service:50053
      FACE_RECOGNITION_SERVICE_URL: face-recognition-service:50054
      WHISPER_SERVICE_URL: whisper-service:50051
      # GEMINI_API_KEY: AIzaSyC16Gj6-wXm6vjalf9Nq_7gF1EGb6dbx-k
      GEMINI_API_KEY: AIzaSyDJnDhNqFO9_tK71lqlphRknXwMzOVaafs

    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
    container_name: smart_mirror_client
    networks:
      - backend
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: unless-stopped

  whisper-service:
    build:
      context: ./services/whisper-service
    container_name: whisper-service
    networks:
      - backend
    ports:
      - '50051:50051'
    restart: unless-stopped

  skin-analysis-service:
    build:
      context: ./services/skin-analysis-service
    container_name: skin-analysis-service
    networks:
      - backend
    ports:
      - '50053:50053'
    restart: unless-stopped

  face-recognition-service:
    build:
      context: ./services/face-recognition-service
    container_name: face-recognition-service
    networks:
      - backend
    ports:
      - '50054:50054'
    restart: unless-stopped

networks:
  backend:
    driver: bridge
    name: backend