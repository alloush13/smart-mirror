services:
  server:
    build: ./server
    container_name: smart_mirror_server
    restart: unless-stopped
    environment:
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:5173
      WHISPER_URL: http://whisper-service:8000/transcribe
      SKIN_ANALYSIS_URL: http://skin-analysis-service:8000
    ports:
      - "5000:5000"
  client:
    build:
      context: ./client
    container_name: smart_mirror_client
    ports:
      - '5173:5173'
    restart: unless-stopped
  whisper-service:
    build:
      context: ./services/whisper-service
    container_name: whisper-service
    ports:
      - '50052:50052'
    restart: unless-stopped
  skin-analysis-service:
    build:
      context: ./services/skin-analysis-service
    container_name: skin-analysis-service
    ports:
      - '50053:50053'
    restart: unless-stopped
  audio-processor-service:
    build: ./services/audio-processor-service
    container_name: audio-processor-service
    ports:
      - '50051:50051'
    restart: unless-stopped