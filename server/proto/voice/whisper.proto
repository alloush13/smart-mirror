syntax = "proto3";

package voice;

service WhisperService {
  rpc StreamTranscribe(stream AudioChunk)
      returns (stream Transcript);
}

message AudioChunk {
  bytes data = 1;

  int32 sample_rate = 2;

  int32 sequence = 3;

  string language = 4;
}

message Transcript {
  string text = 1;

  bool is_final = 2;

  float confidence = 3;

  float start_time = 4;

  float end_time = 5;

  string language = 6;

  int64 processing_time_ms = 7;
}